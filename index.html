<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TS Video Merger</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .container {
            width: 100%;
            max-width: 700px;
        }

        /* Drop zone */
        .drop-zone {
            border: 2px dashed #444;
            border-radius: 12px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: #6e8efb;
            background: rgba(110, 142, 251, 0.05);
        }

        .drop-zone.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .drop-zone p { color: #aaa; margin-bottom: 0.8rem; }
        .drop-zone .browse-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            background: #6e8efb;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .drop-zone .browse-btn:hover { background: #5a7bf7; }

        .limit-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #666;
            margin-top: 0.6rem;
            padding: 0 0.2rem;
        }

        /* File list */
        .file-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .file-list-header h2 { font-size: 1.1rem; color: #ccc; }

        .clear-btn {
            background: none;
            border: 1px solid #555;
            color: #aaa;
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .clear-btn:hover { border-color: #e74c3c; color: #e74c3c; }

        .reorder-hint {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 0.5rem;
            font-style: italic;
        }

        #file-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        #file-list li {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            cursor: grab;
            user-select: none;
            transition: background 0.15s, transform 0.15s, opacity 0.15s;
        }

        #file-list li:active { cursor: grabbing; }
        #file-list li.dragging { opacity: 0.4; transform: scale(0.97); }
        #file-list li.drag-over-item { border-color: #6e8efb; background: #1e1e3a; }

        .file-index {
            min-width: 1.8rem;
            height: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2a2a4a;
            border-radius: 50%;
            font-size: 0.8rem;
            color: #6e8efb;
            font-weight: 600;
        }

        .file-name {
            flex: 1;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-size { font-size: 0.8rem; color: #666; white-space: nowrap; }

        .remove-file {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0 0.3rem;
            line-height: 1;
        }
        .remove-file:hover { color: #e74c3c; }

        .grip-icon { color: #444; font-size: 1rem; }

        /* Merge button */
        .merge-btn {
            display: block;
            width: 100%;
            margin-top: 1.5rem;
            padding: 0.9rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: #fff;
            transition: opacity 0.2s, transform 0.1s;
        }
        .merge-btn:hover { opacity: 0.9; }
        .merge-btn:active { transform: scale(0.99); }
        .merge-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* Progress */
        .progress-area {
            margin-top: 1rem;
            display: none;
        }

        .progress-area.visible { display: block; }

        .progress-bar-track {
            width: 100%;
            height: 8px;
            background: #1a1a2e;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6e8efb, #a777e3);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 0.85rem;
            color: #888;
            margin-top: 0.4rem;
            text-align: center;
        }

        /* Hidden input */
        #file-input { display: none; }

        /* Responsive */
        @media (max-width: 500px) {
            h1 { font-size: 1.4rem; }
            .drop-zone { padding: 1.5rem 1rem; }
        }
    </style>
</head>
<body>
    <h1>TS Video Merger</h1>
    <p class="subtitle">Merge .ts video chunks into a single .mp4 file — entirely in your browser</p>

    <div class="container">
        <div class="drop-zone" id="drop-zone" role="button" tabindex="0" aria-label="Upload .ts video files">
            <p>Drag &amp; drop your .ts files here</p>
            <button class="browse-btn" type="button">Browse Files</button>
            <input type="file" id="file-input" multiple accept=".ts,video/mp2t">
        </div>
        <div class="limit-info">
            <span id="file-count">0 files</span>
            <span id="total-size">0 MB / 2048 MB</span>
        </div>

        <div class="file-list-header" id="file-list-header" style="display:none;">
            <h2>Files (drag to reorder)</h2>
            <button class="clear-btn" id="clear-btn" type="button">Clear All</button>
        </div>
        <p class="reorder-hint" id="reorder-hint" style="display:none;">↕ Drag items to arrange in the correct playback order</p>
        <ul id="file-list" role="list" aria-label="Uploaded video files"></ul>

        <button class="merge-btn" id="merge-btn" disabled type="button">Merge &amp; Convert to MP4</button>

        <div class="progress-area" id="progress-area">
            <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-fill"></div></div>
            <p class="progress-text" id="progress-text">Initializing...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
