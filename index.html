<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSXX Video Merger</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .container {
            width: 100%;
            max-width: 700px;
        }

        /* Drop zone */
        .drop-zone {
            border: 2px dashed #444;
            border-radius: 12px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: #6e8efb;
            background: rgba(110, 142, 251, 0.05);
        }

        .drop-zone.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .drop-zone p { color: #aaa; margin-bottom: 0.8rem; }
        .drop-zone .browse-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            background: #6e8efb;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .drop-zone .browse-btn:hover { background: #5a7bf7; }

        .limit-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #666;
            margin-top: 0.6rem;
            padding: 0 0.2rem;
        }

        /* File list */
        .file-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .file-list-header h2 { font-size: 1.1rem; color: #ccc; }

        .clear-btn {
            background: none;
            border: 1px solid #555;
            color: #aaa;
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .clear-btn:hover { border-color: #e74c3c; color: #e74c3c; }

        .reorder-hint {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 0.5rem;
            font-style: italic;
        }

        #file-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        #file-list li {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            cursor: grab;
            user-select: none;
            transition: background 0.15s, transform 0.15s, opacity 0.15s;
        }

        #file-list li:active { cursor: grabbing; }
        #file-list li.dragging { opacity: 0.4; transform: scale(0.97); }
        #file-list li.drag-over-item { border-color: #6e8efb; background: #1e1e3a; }

        .file-index {
            min-width: 1.8rem;
            height: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2a2a4a;
            border-radius: 50%;
            font-size: 0.8rem;
            color: #6e8efb;
            font-weight: 600;
        }

        .file-name {
            flex: 1;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-size { font-size: 0.8rem; color: #666; white-space: nowrap; }

        .remove-file {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0 0.3rem;
            line-height: 1;
        }
        .remove-file:hover { color: #e74c3c; }

        .grip-icon { color: #444; font-size: 1rem; }

        /* Merge button */
        .merge-btn {
            display: block;
            width: 100%;
            margin-top: 1.5rem;
            padding: 0.9rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: #fff;
            transition: opacity 0.2s, transform 0.1s;
        }
        .merge-btn:hover { opacity: 0.9; }
        .merge-btn:active { transform: scale(0.99); }
        .merge-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* Progress */
        .progress-area {
            margin-top: 1rem;
            display: none;
        }

        .progress-area.visible { display: block; }

        .progress-bar-track {
            width: 100%;
            height: 8px;
            background: #1a1a2e;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6e8efb, #a777e3);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 0.85rem;
            color: #888;
            margin-top: 0.4rem;
            text-align: center;
        }

        /* Hidden input */
        #file-input { display: none; }

        /* Responsive */
        @media (max-width: 500px) {
            h1 { font-size: 1.4rem; }
            .drop-zone { padding: 1.5rem 1rem; }
        }
    </style>
</head>
<body>
    <h1>TS Video Merger</h1>
    <p class="subtitle">Merge .ts video chunks into a single .mp4 file — entirely in your browser</p>

    <div class="container">
        <div class="drop-zone" id="drop-zone" role="button" tabindex="0" aria-label="Upload .ts video files">
            <p>Drag &amp; drop your .ts files here</p>
            <button class="browse-btn" type="button">Browse Files</button>
            <input type="file" id="file-input" multiple accept=".ts,video/mp2t">
        </div>
        <div class="limit-info">
            <span id="file-count">0 files</span>
            <span id="total-size">0 MB / 2048 MB</span>
        </div>

        <div class="file-list-header" id="file-list-header" style="display:none;">
            <h2>Files (drag to reorder)</h2>
            <button class="clear-btn" id="clear-btn" type="button">Clear All</button>
        </div>
        <p class="reorder-hint" id="reorder-hint" style="display:none;">↕ Drag items to arrange in the correct playback order</p>
        <ul id="file-list" role="list" aria-label="Uploaded video files"></ul>

        <button class="merge-btn" id="merge-btn" disabled type="button">Merge &amp; Convert to MP4</button>

        <div class="progress-area" id="progress-area">
            <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-fill"></div></div>
            <p class="progress-text" id="progress-text">Initializing...</p>
        </div>
    </div>

    <script>
    (function () {
        'use strict';

        const MAX_FILES = 50;
        const MAX_TOTAL_BYTES = 2048 * 1024 * 1024; // 2 GB

        // State
        let files = [];       // { id, name, size, file }
        let nextId = 0;
        let isMerging = false;

        // DOM refs
        const dropZone       = document.getElementById('drop-zone');
        const fileInput       = document.getElementById('file-input');
        const fileCountEl     = document.getElementById('file-count');
        const totalSizeEl     = document.getElementById('total-size');
        const fileListHeader  = document.getElementById('file-list-header');
        const reorderHint     = document.getElementById('reorder-hint');
        const fileListEl      = document.getElementById('file-list');
        const clearBtn        = document.getElementById('clear-btn');
        const mergeBtn        = document.getElementById('merge-btn');
        const progressArea    = document.getElementById('progress-area');
        const progressFill    = document.getElementById('progress-fill');
        const progressText    = document.getElementById('progress-text');

        // ── Helpers ──────────────────────────────────────────────

        function totalSize() {
            return files.reduce((s, f) => s + f.size, 0);
        }

        function formatBytes(b) {
            if (b < 1024) return b + ' B';
            if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
            if (b < 1024 * 1024 * 1024) return (b / (1024 * 1024)).toFixed(1) + ' MB';
            return (b / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
        }

        function updateStats() {
            const count = files.length;
            fileCountEl.textContent = count + ' file' + (count !== 1 ? 's' : '');
            totalSizeEl.textContent = formatBytes(totalSize()) + ' / 2048 MB';
            mergeBtn.disabled = count < 2 || isMerging;
            const show = count > 0;
            fileListHeader.style.display = show ? 'flex' : 'none';
            reorderHint.style.display = count > 1 ? 'block' : 'none';

            if (count >= MAX_FILES || totalSize() >= MAX_TOTAL_BYTES) {
                dropZone.classList.add('disabled');
            } else {
                dropZone.classList.remove('disabled');
            }
        }

        // ── Add files ────────────────────────────────────────────

        function addFiles(incoming) {
            const arr = Array.from(incoming);
            for (const f of arr) {
                if (!f.name.toLowerCase().endsWith('.ts')) {
                    alert('Only .ts files are accepted. Skipped: ' + f.name);
                    continue;
                }
                if (files.length >= MAX_FILES) {
                    alert('Maximum ' + MAX_FILES + ' files allowed.');
                    break;
                }
                if (totalSize() + f.size > MAX_TOTAL_BYTES) {
                    alert('Total size limit (2 GB) would be exceeded. Skipped: ' + f.name);
                    continue;
                }
                files.push({ id: nextId++, name: f.name, size: f.size, file: f });
            }
            renderList();
            updateStats();
        }

        // ── Render list ──────────────────────────────────────────

        function renderList() {
            fileListEl.innerHTML = '';
            files.forEach(function (f, i) {
                const li = document.createElement('li');
                li.setAttribute('draggable', 'true');
                li.dataset.id = f.id;
                li.setAttribute('role', 'listitem');
                li.setAttribute('aria-label', 'File ' + (i + 1) + ': ' + f.name);

                li.innerHTML =
                    '<span class="grip-icon" aria-hidden="true">⠿</span>' +
                    '<span class="file-index">' + (i + 1) + '</span>' +
                    '<span class="file-name" title="' + f.name + '">' + f.name + '</span>' +
                    '<span class="file-size">' + formatBytes(f.size) + '</span>' +
                    '<button class="remove-file" title="Remove" aria-label="Remove ' + f.name + '">&times;</button>';

                // Remove handler
                li.querySelector('.remove-file').addEventListener('click', function () {
                    files = files.filter(function (x) { return x.id !== f.id; });
                    renderList();
                    updateStats();
                });

                // Drag handlers
                li.addEventListener('dragstart', onDragStart);
                li.addEventListener('dragover', onDragOver);
                li.addEventListener('dragenter', onDragEnter);
                li.addEventListener('dragleave', onDragLeave);
                li.addEventListener('drop', onDrop);
                li.addEventListener('dragend', onDragEnd);

                // Touch handlers for mobile
                li.addEventListener('touchstart', onTouchStart, { passive: false });
                li.addEventListener('touchmove', onTouchMove, { passive: false });
                li.addEventListener('touchend', onTouchEnd);

                fileListEl.appendChild(li);
            });
        }

        // ── Drag & drop reorder (desktop) ────────────────────────

        let dragSrcId = null;

        function onDragStart(e) {
            dragSrcId = parseInt(this.dataset.id);
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
        function onDragEnter(e) { e.preventDefault(); this.classList.add('drag-over-item'); }
        function onDragLeave() { this.classList.remove('drag-over-item'); }

        function onDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over-item');
            const targetId = parseInt(this.dataset.id);
            if (dragSrcId === null || dragSrcId === targetId) return;
            const srcIdx = files.findIndex(function (f) { return f.id === dragSrcId; });
            const tgtIdx = files.findIndex(function (f) { return f.id === targetId; });
            const item = files.splice(srcIdx, 1)[0];
            files.splice(tgtIdx, 0, item);
            renderList();
        }

        function onDragEnd() {
            dragSrcId = null;
            document.querySelectorAll('#file-list li').forEach(function (li) {
                li.classList.remove('dragging', 'drag-over-item');
            });
        }

        // ── Touch reorder (mobile) ───────────────────────────────

        let touchSrcId = null;
        let touchClone = null;
        let touchStartY = 0;

        function onTouchStart(e) {
            if (e.target.closest('.remove-file')) return;
            touchSrcId = parseInt(this.dataset.id);
            touchStartY = e.touches[0].clientY;
            this.classList.add('dragging');
        }

        function onTouchMove(e) {
            if (touchSrcId === null) return;
            e.preventDefault();
            const touch = e.touches[0];
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            if (!el) return;
            const li = el.closest('#file-list li');
            document.querySelectorAll('#file-list li').forEach(function (item) {
                item.classList.remove('drag-over-item');
            });
            if (li && parseInt(li.dataset.id) !== touchSrcId) {
                li.classList.add('drag-over-item');
            }
        }

        function onTouchEnd(e) {
            if (touchSrcId === null) return;
            const touch = e.changedTouches[0];
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            const li = el ? el.closest('#file-list li') : null;
            if (li) {
                const targetId = parseInt(li.dataset.id);
                if (targetId !== touchSrcId) {
                    const srcIdx = files.findIndex(function (f) { return f.id === touchSrcId; });
                    const tgtIdx = files.findIndex(function (f) { return f.id === targetId; });
                    const item = files.splice(srcIdx, 1)[0];
                    files.splice(tgtIdx, 0, item);
                }
            }
            touchSrcId = null;
            document.querySelectorAll('#file-list li').forEach(function (item) {
                item.classList.remove('dragging', 'drag-over-item');
            });
            renderList();
        }

        // ── File drop zone ───────────────────────────────────────

        dropZone.addEventListener('click', function (e) {
            if (e.target.closest('.browse-btn') || e.target === dropZone || e.target.closest('.drop-zone')) {
                fileInput.click();
            }
        });

        dropZone.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
        });

        fileInput.addEventListener('change', function () {
            if (fileInput.files.length) addFiles(fileInput.files);
            fileInput.value = '';
        });

        dropZone.addEventListener('dragover', function (e) { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', function () { dropZone.classList.remove('drag-over'); });
        dropZone.addEventListener('drop', function (e) {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files);
        });

        clearBtn.addEventListener('click', function () {
            files = [];
            renderList();
            updateStats();
        });

        // ── Merge ────────────────────────────────────────────────

        mergeBtn.addEventListener('click', async function () {
            if (files.length < 2 || isMerging) return;
            isMerging = true;
            mergeBtn.disabled = true;
            dropZone.classList.add('disabled');
            progressArea.classList.add('visible');
            setProgress(0, 'Loading FFmpeg...');

            try {
                console.log('[TS-Merger] Starting merge process...');

                // Helper: fetch as blob URL with download progress
                async function fetchBlobURL(url, mimeType, label) {
                    const resp = await fetch(url);
                    if (!resp.ok) throw new Error('Failed to fetch ' + label + ': ' + resp.status);
                    const contentLength = parseInt(resp.headers.get('Content-Length') || '0', 10);
                    const reader = resp.body.getReader();
                    const chunks = [];
                    let received = 0;

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        chunks.push(value);
                        received += value.length;
                        if (contentLength > 0) {
                            const pct = Math.round((received / contentLength) * 100);
                            setProgress(3 + Math.round(pct * 0.09), 'Downloading ' + label + '... ' + pct + '% (' + formatBytes(received) + ')');
                        } else {
                            setProgress(3, 'Downloading ' + label + '... ' + formatBytes(received));
                        }
                    }

                    const blob = new Blob(chunks, { type: mimeType });
                    return URL.createObjectURL(blob);
                }

                // Helper: read a File as Uint8Array
                function readFileAsUint8Array(file) {
                    return new Promise(function (resolve, reject) {
                        const reader = new FileReader();
                        reader.onload = function () { resolve(new Uint8Array(reader.result)); };
                        reader.onerror = reject;
                        reader.readAsArrayBuffer(file);
                    });
                }

                // Step 1: Load the FFmpeg UMD wrapper (not ESM!) as a script tag.
                // This avoids the cross-origin Worker issue entirely because the
                // UMD build registers on globalThis.FFmpegWASM and we control
                // the worker blob ourselves.
                if (!window._ffmpegLoaded) {
                    setProgress(1, 'Loading FFmpeg library...');
                    await new Promise(function (resolve, reject) {
                        const s = document.createElement('script');
                        s.src = 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.15/dist/umd/ffmpeg.js';
                        s.onload = resolve;
                        s.onerror = function () { reject(new Error('Failed to load FFmpeg UMD script')); };
                        document.head.appendChild(s);
                    });
                    console.log('[TS-Merger] FFmpeg UMD script loaded');

                    await new Promise(function (resolve, reject) {
                        const s = document.createElement('script');
                        s.src = 'https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.2/dist/umd/util.js';
                        s.onload = resolve;
                        s.onerror = function () { reject(new Error('Failed to load FFmpeg util script')); };
                        document.head.appendChild(s);
                    });
                    console.log('[TS-Merger] FFmpeg util loaded');
                    window._ffmpegLoaded = true;
                }

                const { FFmpeg } = FFmpegWASM;
                const { fetchFile } = FFmpegUtil;

                // Step 2: Fetch the worker.js source and create a same-origin blob
                setProgress(2, 'Preparing worker...');
                const workerResp = await fetch('https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.15/dist/umd/814.ffmpeg.js');
                const workerText = await workerResp.text();
                const workerBlob = new Blob([workerText], { type: 'text/javascript' });
                const workerBlobURL = URL.createObjectURL(workerBlob);
                console.log('[TS-Merger] Worker blob URL created');

                // Step 3: Download the single-threaded core + WASM as blob URLs
                const baseURL = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.10/dist/umd';

                setProgress(3, 'Downloading FFmpeg core...');
                const coreURL = await fetchBlobURL(baseURL + '/ffmpeg-core.js', 'text/javascript', 'core JS');
                console.log('[TS-Merger] Core JS ready');

                setProgress(4, 'Downloading FFmpeg WASM (~32 MB)...');
                const wasmURL = await fetchBlobURL(baseURL + '/ffmpeg-core.wasm', 'application/wasm', 'WASM binary');
                console.log('[TS-Merger] WASM ready');

                // Step 4: Create FFmpeg instance and load with all blob URLs
                const ffmpeg = new FFmpeg();

                ffmpeg.on('log', function (ev) {
                    console.log('[FFmpeg log]', ev.message);
                });

                ffmpeg.on('progress', function (ev) {
                    const pct = Math.max(0, Math.min(100, Math.round((ev.progress || 0) * 100)));
                    setProgress(15 + Math.round(pct * 0.75), 'Converting... ' + pct + '%');
                });

                setProgress(13, 'Initializing FFmpeg...');
                console.log('[TS-Merger] Calling ffmpeg.load()...');
                console.time('[TS-Merger] ffmpeg.load');
                await ffmpeg.load({
                    coreURL: coreURL,
                    wasmURL: wasmURL,
                    classWorkerURL: workerBlobURL,
                });
                console.timeEnd('[TS-Merger] ffmpeg.load');
                console.log('[TS-Merger] ffmpeg.load() completed!');

                setProgress(15, 'Writing files to virtual filesystem...');

                // Write each .ts file into ffmpeg's virtual FS
                const tsNames = [];
                for (let i = 0; i < files.length; i++) {
                    const name = 'input' + i + '.ts';
                    tsNames.push(name);
                    setProgress(15 + Math.round((i / files.length) * 25), 'Loading file ' + (i + 1) + ' of ' + files.length + '...');
                    const fileData = await readFileAsUint8Array(files[i].file);
                    await ffmpeg.writeFile(name, fileData);
                }

                // Build concat list
                const concatContent = tsNames.map(function (n) { return "file '" + n + "'"; }).join('\n');
                await ffmpeg.writeFile('list.txt', new TextEncoder().encode(concatContent));

                setProgress(45, 'Merging and converting to MP4...');

                await ffmpeg.exec([
                    '-f', 'concat',
                    '-safe', '0',
                    '-i', 'list.txt',
                    '-c', 'copy',
                    '-bsf:a', 'aac_adtstoasc',
                    '-movflags', '+faststart',
                    'output.mp4'
                ]);

                setProgress(90, 'Preparing download...');

                const data = await ffmpeg.readFile('output.mp4');
                const blob = new Blob([data.buffer], { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.href = url;
                a.download = 'merged_video.mp4';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                setTimeout(function () { URL.revokeObjectURL(url); }, 10000);

                setProgress(100, 'Done! Your file is downloading.');

                // Cleanup virtual FS
                for (const name of tsNames) {
                    try { await ffmpeg.deleteFile(name); } catch (_) {}
                }
                try { await ffmpeg.deleteFile('list.txt'); } catch (_) {}
                try { await ffmpeg.deleteFile('output.mp4'); } catch (_) {}

            } catch (err) {
                console.error('Merge failed:', err);
                setProgress(0, 'Error: ' + (err.message || 'Merge failed. Check console for details.'));
            } finally {
                isMerging = false;
                mergeBtn.disabled = files.length < 2;
                dropZone.classList.remove('disabled');
            }
        });

        function setProgress(pct, text) {
            progressFill.style.width = pct + '%';
            progressText.textContent = text;
        }

        // Init
        updateStats();
    })();
    </script>
</body>
</html>
